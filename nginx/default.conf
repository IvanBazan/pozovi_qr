server {
    listen 80;
    server_name pozoviqr.ru www.pozoviqr.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pozoviqr.ru www.pozoviqr.ru;

    ssl_certificate     /etc/letsencrypt/live/pozoviqr.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pozoviqr.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Admin SPA — доступ только с доверенных IP
    location /admin {
        # allow <ADMIN_IP>;
        # deny all;
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # API — только для админа
    location /api/ {
        # allow <ADMIN_IP>;
        # deny all;
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Публичные редиректы
    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }
}
